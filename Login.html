<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huellas de Auxilio - Login</title>
    <link rel="stylesheet" href="HE_Login.css" />
    <link rel="stylesheet" href="HE_Footer.css"/>
  </head>

  <body>
    <header class="header-login">
      <a href="index.html" class="back-btn" aria-label="Volver al inicio">
        <img src="icons/flecha-volver.png" alt="Volver" />
      </a>
    </header>

    <main class="login-container">
      <section class="login-card">
        <img src="img/logo.png" alt="Huellas de Auxilio" class="login-logo" />

        <h1 class="login-title">Bienvenido de vuelta</h1>

        <div class="mensaje-error" id="mensajeError">
          <img src="icons/jam_alert-f.png" alt="Error" class="alert-icon" />

          <div>
            <h3 id="tituloError">Correo o contraseña incorrectos</h3>
            <p id="textoError">Verifica tus datos e inténtalo de nuevo.</p>
          </div>
        </div>

        <form class="login-form" id="formLogin">
          <div class="form-group">
            <label for="email">Correo electrónico</label>

            <div class="input-box" id="boxEmail">
              <img src="icons/email2.png" alt="Correo" class="input-icon" />

              <input
                type="email"
                id="email"
                placeholder="ejemplo@correo.com"
              />

              <img
                src="icons/jam_alert-f.png"
                alt="Error"
                class="input-error-img"
                id="errorEmailIcon"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>

            <div class="input-box" id="boxPassword">
              <img src="icons/candado.png" alt="Contraseña" class="input-icon" />

              <input type="password" id="password" placeholder="********" />

              <img
                src="icons/jam_alert-f.png"
                alt="Error"
                class="input-error-img"
                id="errorPasswordIcon"
              />
            </div>
          </div>

          <a href="recuperar.html" class="forgot-password">
            ¿Olvidaste tu contraseña?
          </a>

          <button type="submit" class="login-btn">Ingresar</button>

          <div class="separator">
            <span></span>
            <p>o</p>
            <span></span>
          </div>

          <p class="create-account">
            ¿No tienes una cuenta?
            <a href="Crear_Cuenta.html">Crear cuenta</a>
          </p>
        </form>
      </section>
    </main>

<footer class="footer-compacto">
  <div class="footer-compacto-container">
    <div class="footer-compacto-brand">
      <img src="img/logo-blanco.png" alt="Logo Huellas de Auxilio" />

      <p>
        © 2026 Huellas de Auxilio. Todos<br />
        los derechos reservados.
      </p>
    </div>

    <div class="footer-compacto-links">
      <a href="#">Soporte</a>
      <a href="documentos/politica-privacidad.pdf" target="_blank">
        Política de Privacidad
      </a>
      <a href="documentos/terminos-condiciones.pdf" target="_blank">
        Términos y condiciones
      </a>
    </div>

    <div class="footer-social">
      <a href="#">
        <img src="icons/facebook.png" alt="Facebook" />
      </a>

      <a href="#">
        <img src="icons/x.png" alt="X" />
      </a>

      <a href="#">
        <img src="icons/instagram.png" alt="Instagram" />
      </a>
    </div>
  </div>
</footer>

    <script src="login.js"></script>
  </body>
</html>
